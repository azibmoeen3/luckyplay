plugins {
    id 'com.android.application'
}

android {
    namespace 'com.koadly.luckyplay'
    compileSdk 35

    defaultConfig {
        applicationId 'com.koadly.luckyplay'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0.0'

        def appUrl = (project.findProperty('WEB_APP_URL') ?: 'https://yourdomain.com').toString()
        buildConfigField 'String', 'WEB_APP_URL', '"' + appUrl.replace('"', '\\"') + '"'
    }

    buildTypes {
        debug {
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
